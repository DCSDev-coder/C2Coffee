<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Welcome Back - C² Coffee</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600;1,700&family=Libre+Baskerville:ital,wght@0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=28">
</head>
<body>
  <div id="app-container" class="container cream-bg">
    <!-- Top & Bottom Decorative Leaf & Coffee Bean Line Art -->
    <div class="top-leaf-bg">
      <svg viewBox="0 0 150 150" fill="none" stroke="#E2D7CD" stroke-width="1.2">
        <path d="M 120 0 Q 70 40 10 140" stroke-linecap="round"/>
        <path d="M 90 24 C 115 15 135 25 140 45 C 120 50 100 40 90 24 Z"/>
        <path d="M 90 24 Q 115 35 140 45"/>
        <path d="M 65 45 C 45 30 35 10 50 0 C 65 15 70 35 65 45 Z"/>
        <path d="M 65 45 Q 50 20 50 0"/>
        <path d="M 45 75 C 65 65 85 75 90 95 C 70 95 50 85 45 75 Z"/>
        <path d="M 45 75 Q 70 80 90 95"/>
        <path d="M 25 105 C 10 90 0 70 10 55 C 25 70 30 90 25 105 Z"/>
        <path d="M 25 105 Q 15 80 10 55"/>
      </svg>
    </div>

    <div class="bottom-leaf-bg">
      <svg viewBox="0 0 160 160" fill="none" stroke="#E2D7CD" stroke-width="1.2">
        <path d="M 0 160 Q 40 100 130 30" stroke-linecap="round"/>
        <path d="M 30 135 C 10 120 0 95 15 80 C 35 90 40 115 30 135 Z"/>
        <path d="M 30 135 Q 15 105 15 80"/>
        <path d="M 60 110 C 80 95 100 105 105 125 C 85 125 65 115 60 110 Z"/>
        <path d="M 60 110 Q 85 115 105 125"/>
        <path d="M 85 80 C 70 60 65 40 80 25 C 95 40 95 60 85 80 Z"/>
        <path d="M 85 80 Q 80 50 80 25"/>
        <ellipse cx="65" cy="142" rx="12" ry="8" transform="rotate(-35 65 142)"/>
        <path d="M 57 146 Q 65 142 73 138"/>
        <ellipse cx="92" cy="148" rx="11" ry="7" transform="rotate(-15 92 148)"/>
        <path d="M 85 150 Q 92 148 99 146"/>
      </svg>
    </div>

    <div class="header-logo-section">
      <div class="c2-logo-badge">
        <img src="assets/c2_logo.png" alt="C2 Coffee Logo" class="c2-logo-img">
      </div>

      <p class="step-label transparent-step">&nbsp;</p>
      <h1 class="title green-title title-italic">Welcome Back</h1>
      <p class="subtitle brown-subtitle">Log in to continue your coffee journey and enjoy exclusive rewards.</p>
    </div>

    <div class="form-body align-center">
      <div class="form-group">
        <label>Phone Number</label>
        <div class="phone-row">
          <div class="phone-country">
            <img src="assets/malaysia_flag.png" alt="Malaysia Flag" class="flag-img-small">
            <span class="code">+60</span>
          </div>
          <div class="phone-number">
            <input type="tel" id="login-phone" placeholder="1234567890">
          </div>
        </div>
      </div>

      <div class="divider">
        <div class="line"></div>
        <span>or</span>
        <div class="line"></div>
      </div>

      <button class="google-btn" type="button">
        <svg width="16" height="16" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.25-.164-1.84H9v3.48h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        <span>Continue with Google</span>
      </button>

      <div class="bottom-section">
        <p class="join-link">New member? <a href="step1.html">Join now</a></p>
        <button class="login-btn green-btn" onclick="submitLogin()">LOGIN</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
