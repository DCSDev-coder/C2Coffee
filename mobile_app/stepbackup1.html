<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Create Your Account - C² Coffee</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600;1,700&family=Libre+Baskerville:ital,wght@0,700;1,400;1,700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=28">
  <style>
    /* ── Override: orange header + white card layout ── */
    #app-container {
      justify-content: flex-start;
      padding: 0;
      background-color: #E56000;
    }

    /* Orange header section */
    .sb1-header {
      width: 100%;
      background-color: #E56000;
      padding: 44px 28px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-sizing: border-box;
      flex-shrink: 0;
      min-height: 240px;
      z-index: 2;
    }

    .sb1-step-label {
      font-family: 'Playfair Display', 'Libre Baskerville', Georgia, serif;
      font-style: italic;
      font-size: 22px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.90);
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    .sb1-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 48px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.05;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .sb1-subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.80);
      line-height: 1.4;
    }

    /* White card */
    .sb1-card {
      width: 100%;
      flex: 1;
      background-color: #FFFFFF;
      border-radius: 30px 30px 0 0;
      padding: 28px 24px 24px;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 2;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
    }

    /* Form labels */
    .sb1-group {
      margin-bottom: 14px;
      width: 100%;
    }

    .sb1-group label {
      display: block;
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: 14.5px;
      color: #1C3B24;
      margin-bottom: 6px;
    }

    /* Standard inputs */
    .sb1-group input[type="text"],
    .sb1-group input[type="email"],
    .sb1-group input[type="tel"],
    .sb1-group input[type="date"] {
      width: 100%;
      height: 46px;
      border: 1.5px solid #E6DCD3;
      border-radius: 23px;
      padding: 0 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      color: #333;
      outline: none;
      background: #FFFFFF;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      box-sizing: border-box;
    }

    .sb1-group input::placeholder {
      color: #C4BDB5;
    }

    .sb1-group input:focus {
      border-color: #E56000;
      box-shadow: 0 0 0 3px rgba(229, 96, 0, 0.12);
    }

    /* Phone row */
    .sb1-phone-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .sb1-phone-country {
      width: 86px;
      height: 46px;
      border: 1.5px solid #E6DCD3;
      border-radius: 23px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 0 10px;
      flex-shrink: 0;
      background: #FFFFFF;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      position: relative;
      cursor: pointer;
      transition: border-color 0.2s ease;
      box-sizing: border-box;
    }

    .sb1-phone-country:hover {
      border-color: #E56000;
    }

    .sb1-phone-country .sb1-flag {
      width: 20px;
      height: 13px;
      border-radius: 2px;
      object-fit: cover;
    }

    .sb1-phone-country .sb1-code {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: #1C3B24;
    }

    .sb1-country-select {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      border-radius: 23px;
      -webkit-appearance: none;
      appearance: none;
    }

    .sb1-phone-number {
      flex: 1;
    }

    .sb1-phone-number input {
      width: 100%;
      height: 46px;
      border: 1.5px solid #E6DCD3;
      border-radius: 23px;
      padding: 0 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      color: #333;
      outline: none;
      background: #FFFFFF;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      box-sizing: border-box;
    }

    .sb1-phone-number input::placeholder {
      color: #C4BDB5;
    }

    .sb1-phone-number input:focus {
      border-color: #E56000;
      box-shadow: 0 0 0 3px rgba(229, 96, 0, 0.12);
    }

    /* Bottom section */
    .sb1-bottom {
      margin-top: auto;
      padding-top: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .sb1-login-link {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: #4A3A2F;
      text-align: center;
      margin-bottom: 14px;
    }

    .sb1-login-link a {
      color: #E56000;
      font-weight: 700;
      text-decoration: none;
    }

    .sb1-login-link a:hover {
      text-decoration: underline;
    }

    .sb1-next-btn {
      width: 100%;
      height: 50px;
      background-color: #E56000;
      border: none;
      border-radius: 25px;
      color: #FFFFFF;
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: background-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 6px 18px rgba(229, 96, 0, 0.35);
    }

    .sb1-next-btn:hover {
      background-color: #C75200;
      box-shadow: 0 8px 22px rgba(229, 96, 0, 0.45);
    }

    .sb1-next-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>
  <div id="app-container" class="container">

    <!-- Orange Header -->
    <div class="sb1-header">
      <p class="sb1-step-label">Step 1 of 2</p>
      <h1 class="sb1-title">Create Your Account</h1>
      <p class="sb1-subtitle">Join C2 and start earning rewards with every sip.</p>
    </div>

    <!-- White Form Card -->
    <div class="sb1-card">

      <!-- Username -->
      <div class="sb1-group">
        <label for="sb1-username">Username</label>
        <input type="text" id="signup-username" placeholder="Username">
      </div>

      <!-- Email -->
      <div class="sb1-group">
        <label for="sb1-email">Email</label>
        <input type="email" id="signup-email" placeholder="Email@gmail.com">
      </div>

      <!-- Phone Number -->
      <div class="sb1-group">
        <label>Phone Number</label>
        <div class="sb1-phone-row">
          <div class="sb1-phone-country">
            <img src="assets/malaysia_flag.png" alt="MY Flag" class="sb1-flag">
            <span class="sb1-code">+60</span>
            <select class="sb1-country-select" onchange="updateSB1CountryCode(this)">
              <option value="+60" data-flag="my" selected>Malaysia (+60)</option>
              <option value="+65" data-flag="sg">Singapore (+65)</option>
              <option value="+62" data-flag="id">Indonesia (+62)</option>
              <option value="+66" data-flag="th">Thailand (+66)</option>
              <option value="+63" data-flag="ph">Philippines (+63)</option>
              <option value="+84" data-flag="vn">Vietnam (+84)</option>
              <option value="+44" data-flag="gb">United Kingdom (+44)</option>
              <option value="+1" data-flag="us">United States (+1)</option>
              <option value="+61" data-flag="au">Australia (+61)</option>
              <option value="+86" data-flag="cn">China (+86)</option>
              <option value="+81" data-flag="jp">Japan (+81)</option>
              <option value="+82" data-flag="kr">South Korea (+82)</option>
            </select>
          </div>
          <div class="sb1-phone-number">
            <input type="tel" id="signup-phone" placeholder="1234567890">
          </div>
        </div>
      </div>

      <!-- Birthday -->
      <div class="sb1-group">
        <label for="sb1-birthday">Birthday</label>
        <input type="date" id="signup-birthday" onclick="if(this.showPicker) this.showPicker()">
      </div>

      <!-- Bottom -->
      <div class="sb1-bottom">
        <p class="sb1-login-link">Already a member? <a href="loginbackup.html">Login</a></p>
        <button class="sb1-next-btn" type="button" onclick="validateStep1()">NEXT STEP</button>
      </div>

    </div>
  </div>

  <script>
    function updateSB1CountryCode(select) {
      const code = select.value;
      const codeSpan = select.closest('.sb1-phone-country').querySelector('.sb1-code');
      if (codeSpan) codeSpan.textContent = code;
    }
  </script>
  <script src="app.js"></script>
</body>

</html>
