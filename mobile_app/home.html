<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Home - C² Coffee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=32">
</head>
<body>
  <div id="app-container" class="container home-container">
    <!-- Top Bar Navigation Header -->
    <div class="home-top-bar">
      <div class="user-greeting-group">
        <div class="mini-c2-badge">
          <img src="assets/c2_logo.png" alt="C2 Logo" class="mini-c2-img">
        </div>
        <div class="greeting-text">
          <p class="sub-greeting">Good morning,</p>
          <h2 class="user-name" id="display-user-name">Coffeelover1</h2>
        </div>
      </div>

      <div class="top-actions-group">
        <button class="icon-btn notif-btn" aria-label="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
        </button>
        <div class="wallet-pill-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="wallet-icon">
            <rect x="2" y="4" width="20" height="16" rx="4"></rect>
            <path d="M16 12h.01"></path>
          </svg>
          <span class="balance-text">RM0.00</span>
        </div>
      </div>
    </div>

    <!-- Scrollable Main Dashboard Content -->
    <div class="home-scroll-body">
      <!-- Barista Craft Promo Banner Carousel -->
      <div class="promo-banner-card" id="promo-carousel">
        <div class="carousel-track" id="carousel-track">
          <div class="carousel-slide active">
            <img src="assets/barista_craft_banner.png" alt="C2 Barista Craft Promo" class="banner-img">
          </div>
          <div class="carousel-slide">
            <img src="assets/promo_banner_2.png" alt="Morning Roast Special Promo" class="banner-img">
          </div>
          <div class="carousel-slide">
            <img src="assets/promo_banner_3.png" alt="Coffee & Candle Pairing Promo" class="banner-img">
          </div>
        </div>

        <!-- Control Buttons -->
        <button class="carousel-btn prev-btn" onclick="prevSlide()" aria-label="Previous Slide">&lsaquo;</button>
        <button class="carousel-btn next-btn" onclick="nextSlide()" aria-label="Next Slide">&rsaquo;</button>

        <!-- Carousel Indicators -->
        <div class="carousel-dots">
          <span class="dot active" onclick="goToSlide(0)"></span>
          <span class="dot" onclick="goToSlide(1)"></span>
          <span class="dot" onclick="goToSlide(2)"></span>
        </div>
      </div>

      <!-- Quick Action Tiles (MY ORDER & MY REFERRAL) -->
      <div class="action-tiles-row">
        <div class="action-tile tile-order">
          <div class="tile-title">MY<br>ORDER</div>
        </div>
        <div class="action-tile tile-referral">
          <div class="tile-title">MY<br>REFERRAL</div>
        </div>
      </div>

      <!-- Best Seller Section -->
      <div class="best-seller-section">
        <div class="section-header">
          <h3 class="section-title">Best Seller</h3>
          <a href="#" class="see-all-link">See all &rarr;</a>
        </div>

        <div class="best-seller-scroll">
          <!-- Card 1 -->
          <div class="product-card">
            <div class="product-img-wrap">
              <img src="assets/shakerato_bianco.png" alt="Shakerato Bianco" class="product-img">
            </div>
            <div class="product-info">
              <h4 class="product-name">Shakerato Bianco</h4>
              <p class="product-price">RM 15.90</p>
            </div>
          </div>

          <!-- Card 2 -->
          <div class="product-card">
            <div class="product-img-wrap">
              <img src="assets/blue_cloud_coffee.png" alt="Blue Cloud Coconut Coffee" class="product-img">
            </div>
            <div class="product-info">
              <h4 class="product-name">Blue Cloud Coconut Coffee</h4>
              <p class="product-price">RM 15.90</p>
            </div>
          </div>

          <!-- Card 3 -->
          <div class="product-card">
            <div class="product-img-wrap">
              <img src="assets/bloody_peach.png" alt="Bloody Peach" class="product-img">
            </div>
            <div class="product-info">
              <h4 class="product-name">Bloody Peach</h4>
              <p class="product-price">RM 15.90</p>
            </div>
          </div>

          <!-- Card 4 -->
          <div class="product-card">
            <div class="product-img-wrap">
              <img src="assets/peachy_jasmine.png" alt="Peachy Jasmine" class="product-img">
            </div>
            <div class="product-info">
              <h4 class="product-name">Peachy Jasmine</h4>
              <p class="product-price">RM 15.90</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <div class="bottom-nav-bar">
      <div class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span class="nav-label">Home</span>
      </div>

      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
          <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
          <line x1="6" y1="1" x2="6" y2="4"></line>
          <line x1="10" y1="1" x2="10" y2="4"></line>
          <line x1="14" y1="1" x2="14" y2="4"></line>
        </svg>
        <span class="nav-label">Menu</span>
      </div>

      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        <span class="nav-label">Orders</span>
      </div>

      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon">
          <polyline points="20 12 20 22 4 22 4 12"></polyline>
          <rect x="2" y="7" width="20" height="5"></rect>
          <line x1="12" y1="22" x2="12" y2="7"></line>
          <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path>
          <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path>
        </svg>
        <span class="nav-label">Rewards</span>
      </div>

      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span class="nav-label">Account</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
